version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  intl: ^0.19.0
